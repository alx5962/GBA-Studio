name: GBA Studio CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-rom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable || npm ci

      - name: Fetch engine and tool dependencies
        run: npm run fetch-deps

      - name: Run unit tests
        run: npm test

      - name: Run engine unit tests
        run: make -C appData/engine/gbavm test-unit HOST_CC=gcc

      - name: Run engine integration tests
        run: make -C appData/engine/gbavm test-integration HOST_CC=gcc

      - name: Build CLI
        run: npm run make:cli

      - name: Configure downloaded devkitARM
        id: devkitpro
        run: |
          DEVKITPRO_PATH="$GITHUB_WORKSPACE/buildTools/linux-x64"
          DEVKITARM_PATH="$DEVKITPRO_PATH/devkitARM"
          echo "DEVKITPRO=$DEVKITPRO_PATH" >> "$GITHUB_ENV"
          echo "DEVKITARM=$DEVKITARM_PATH" >> "$GITHUB_ENV"
          echo "$DEVKITARM_PATH/bin" >> "$GITHUB_PATH"
          test -x "$DEVKITARM_PATH/bin/arm-none-eabi-gcc"

      - name: Build sample GBA ROM
        if: steps.devkitpro.outcome == 'success'
        continue-on-error: true
        env:
          DEVKITPRO: ${{ env.DEVKITPRO }}
          DEVKITARM: ${{ env.DEVKITARM }}
        run: npm run build:gba -- test/data/projects/RunProject/RunProject.gbsproj out/RunProject.gba

      - name: Build engine ROM
        if: steps.devkitpro.outcome == 'success'
        continue-on-error: true
        env:
          DEVKITPRO: ${{ env.DEVKITPRO }}
          DEVKITARM: ${{ env.DEVKITARM }}
        run: make -C appData/engine/gbavm

      - name: Export sample GBDK project
        run: node out/cli/gb-studio-cli.js export test/data/projects/RunProject/RunProject.gbsproj out/ci/RunProject

      - name: Upload ROM and export artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gba-studio-rom-smoke
          if-no-files-found: ignore
          path: |
            out/RunProject.gba
            appData/engine/gbavm/bin/game.gba
            out/ci/RunProject/**

  build-windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable || npm ci

      - name: Fetch engine and tool dependencies
        run: npm run fetch-deps

      - name: Build Windows installer
        run: npm run make:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: gba-studio-windows-installer
          path: |
            out/make/squirrel.windows/x64/*.exe
            out/make/squirrel.windows/x64/*.nupkg
            out/make/squirrel.windows/x64/RELEASES
            out/make/zip/win32/x64/*.zip

  build-linux-installers:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable || npm ci

      - name: Fetch engine and tool dependencies
        run: npm run fetch-deps

      - name: Build Linux installers
        run: npm run make:linux

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: gba-studio-linux-installers
          path: |
            out/make/deb/x64/*.deb
            out/make/rpm/x64/*.rpm
            out/make/AppImage/x64/*.AppImage
            out/make/zip/linux/x64/*.zip

  build-macos-installers:
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable || npm ci

      - name: Fetch engine and tool dependencies
        run: npm run fetch-deps

      - name: Build macOS ARM installers
        env:
          APPLE_ID: ${{ secrets.MAC_NOTARIZE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.MAC_NOTARIZE_PWD }}
          APPLE_TEAM_ID: ${{ secrets.MAC_NOTARIZE_TEAM }}
        run: npm run make:mac

      - name: Build macOS Intel installers
        env:
          APPLE_ID: ${{ secrets.MAC_NOTARIZE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.MAC_NOTARIZE_PWD }}
          APPLE_TEAM_ID: ${{ secrets.MAC_NOTARIZE_TEAM }}
        run: npm run make:mac-intel

      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: gba-studio-macos-installers
          path: |
            out/make/*-arm64.dmg
            out/make/*-x64.dmg
            out/make/zip/darwin/arm64/*.zip
            out/make/zip/darwin/x64/*.zip

  attach-release-artifacts:
    needs: [build-windows-installer, build-linux-installers, build-macos-installers]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Attach artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
